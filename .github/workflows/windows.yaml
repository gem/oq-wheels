name: Windows Geospatial Wheels

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      # -------------------------------------------------------
      # 1. Install OSGeo4W (single source of truth)
      # -------------------------------------------------------
      - name: Install OSGeo4W
        shell: powershell
        run: |
          Invoke-WebRequest `
            -Uri "https://download.osgeo.org/osgeo4w/osgeo4w-setup.exe" `
            -OutFile osgeo4w-setup.exe

          Start-Process -Wait -FilePath .\osgeo4w-setup.exe -ArgumentList `
            "--quiet-mode",
            "--root C:\OSGeo4W",
            "--site https://download.osgeo.org/osgeo4w/v2/snapshots/20260629-095933",
            "--packages gdal,gdal-devel,proj,proj-devel"

      # -------------------------------------------------------
      # 2. Environment (CRITICAL PART)
      # -------------------------------------------------------
      - name: Configure environment
        shell: powershell
        run: |
          echo "C:\OSGeo4W\bin" | Out-File -Append $env:GITHUB_PATH

          echo "PROJ_DATA=C:\OSGeo4W\share\proj" | Out-File -Append $env:GITHUB_ENV
          echo "GDAL_DATA=C:\OSGeo4W\share\gdal" | Out-File -Append $env:GITHUB_ENV
          echo "PROJ_DIR=C:\OSGeo4W" | Out-File -Append $env:GITHUB_ENV

          Remove-Item Env:PROJ_LIB -ErrorAction Ignore
          echo "=== ENV CHECK ==="

          echo "PATH:"
          echo $env:PATH
          echo ""
          echo "PROJ_DATA:"
          echo $env:PROJ_DATA
          echo "GDAL_DATA:"
          echo $env:GDAL_DATA

          echo ""
          echo "=== BINARY CHECK ==="
          where proj
          where gdalinfo

          proj
          gdalinfo --version

      # -------------------------------------------------------
      # 3. Build tools
      # -------------------------------------------------------
      - name: Install build tools
        run: |
          python -m pip install --upgrade pip setuptools wheel build delvewheel cython numpy==2.2.6

      # -------------------------------------------------------
      # 4. Build pyproj FROM SOURCE (CRITICAL FIX)
      # -------------------------------------------------------
      - name: Build pyproj from source
        shell: powershell
        run: |
          git clone https://github.com/pyproj4/pyproj.git
          cd pyproj
          git checkout v3.7.2

          python -m pip wheel . `
            --no-build-isolation `
            -v

      # -------------------------------------------------------
      # 5. Build GDAL (must match OSGeo4W)
      # -------------------------------------------------------
      - name: Build GDAL wheel
        shell: powershell
        run: |
          python -m pip wheel GDAL==3.13.1 `
            --no-build-isolation `
            -v

      # -------------------------------------------------------
      # 6. Optional stack packages
      # -------------------------------------------------------
      - name: Build Fiona / Rasterio
        shell: powershell
        run: |
          python -m pip wheel fiona rasterio `
            --no-binary :all: `
            --no-build-isolation `
            -v

      # -------------------------------------------------------
      # 7. Repair wheels (ONLY after correctness)
      # -------------------------------------------------------
      - name: Repair wheels with delvewheel
        shell: powershell
        run: |
          mkdir dist

          Get-ChildItem *.whl | ForEach-Object {
            if ($_.Name -match "win_amd64") {
              delvewheel repair `
                --add-path C:\OSGeo4W\bin `
                --wheel-dir dist $_.FullName
            } else {
              Copy-Item $_.FullName dist/
            }
          }

      # -------------------------------------------------------
      # 8. Upload artifacts
      # -------------------------------------------------------
      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: geospatial-wheels-${{ matrix.python-version }}
          path: dist/*.whl
