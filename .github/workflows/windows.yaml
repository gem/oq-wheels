name: (Windows) Build Geospatial Wheels
on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:
jobs:
  build-windows-wheels:
    name: Geospatial Wheels ${{ matrix.python-version }}
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
      - name: Set up Python  ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install OSGeo4W (GDAL, PROJ & Devel files)
        shell: powershell
        run: |
          Write-Host "Downloading OSGeo4W installer..." -ForegroundColor Cyan
          Invoke-WebRequest -Uri "https://download.osgeo.org/osgeo4w/osgeo4w-setup.exe" -OutFile "osgeo4w-setup.exe"

          # Create a temporary local package directory for the installer cache
          New-Item -ItemType Directory -Force -Path "C:\OSGeo4W-Packages"

          Write-Host "Running OSGeo4W installer in quiet mode..." -ForegroundColor Cyan
          # Use correct flags to force clean internet download and silent extraction
          Start-Process -FilePath ".\osgeo4w-setup.exe" -ArgumentList `
            "--quiet-mode", `
            "--advanced", `
            "--autoaccept", `
            "--no-shortcuts", `
            "--no-desktop", `
            "--no-startmenu", `
            "--root", "C:\OSGeo4W", `
            "--local-package-dir", "C:\OSGeo4W-Packages", `
            "--site", "https://download.osgeo.org/osgeo4w/v2", `
            "--packages", "gdal=3.13.1-1,proj=9.8.1-1,gdal-devel=3.13.1-1,proj-devel=9.8.1-1" `
            -Wait -NoNewWindow

          Write-Host "Verifying installation paths..." -ForegroundColor Cyan
          if (Test-Path "C:\OSGeo4W\include\gdal.h") {
              Write-Host "Success: gdal.h found at C:\OSGeo4W\include\gdal.h" -ForegroundColor Green
          } else {
              Write-Error "CRITICAL ERROR: OSGeo4W installation failed! C:\OSGeo4W\include\gdal.h does not exist."
              # Output directory structure to help debug if it fails
              Get-ChildItem -Path "C:\OSGeo4W" -Recurse -Depth 2 -ErrorAction SilentlyContinue
              exit 1
          }

      - name: Install Build Tools & Compilation Requirements
        shell: powershell
        run: |
          python -m pip install --upgrade pip setuptools wheel delvewheel
          python -m pip install cython numpy==2.2.6 versioneer packaging
      - name: Configure Environment Variables
        shell: powershell
        run: |
          echo "C:\OSGeo4W\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          echo "INCLUDE=C:\OSGeo4W\include" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          echo "LIB=C:\OSGeo4W\lib" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          echo "LINK=gdal_i.lib" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          echo "PROJ_DIR=C:\OSGeo4W" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          echo "GDAL_HOME=C:\OSGeo4W" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
      - name: Build Unrepaired Wheels (Isolated & Diagnostic)
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path .\dist_unrepaired
           # 1. Build GDAL
          $env:INCLUDE = "C:\OSGeo4W\include"
          $env:LIB = "C:\OSGeo4W\lib"
          pip wheel GDAL==3.13.1 --no-build-isolation --wheel-dir=.\dist_unrepaired
          # 2. Build Fiona
          $env:GDAL_VERSION = "3.13.1"
          [System.Environment]::SetEnvironmentVariable("GDAL_VERSION", "3.13.1", "Process")
          pip wheel fiona --no-binary fiona --no-build-isolation --wheel-dir=.\dist_unrepaired ` --config-settings="build_ext.include_dirs=C:\OSGeo4W\include" ` --config-settings="build_ext.library_dirs=C:\OSGeo4W\lib" ` --config-settings="build_ext.libraries=gdal_i"
           # 3. Build PyProj
          [System.Environment]::SetEnvironmentVariable("PATH", "C:\OSGeo4W\bin;" + [System.Environment]::GetEnvironmentVariable("PATH", "Process"), "Process")
          $env:PROJ_DIR = "C:\OSGeo4W"
          pip wheel pyproj --no-binary pyproj --no-build-isolation --wheel-dir=.\dist_unrepaired ` --config-settings="build_ext.include_dirs=C:\OSGeo4W\include" ` --config-settings="build_ext.library_dirs=C:\OSGeo4W\lib"
          # 4. Build Rasterio
          pip wheel rasterio --no-binary rasterio --no-build-isolation --wheel-dir=.\dist_unrepaired ` --config-settings="build_ext.include_dirs=C:\OSGeo4W\include" ` --config-settings="build_ext.library_dirs=C:\OSGeo4W\lib" ` --config-settings="build_ext.libraries=gdal_i"
          # 5. Build PyOgrio
          $env:GDAL_HOME = "C:\OSGeo4W"
          $env:GDAL_INCLUDE_PATH = "C:\OSGeo4W\include"
          $env:GDAL_LIBRARY_PATH = "C:\OSGeo4W\lib"
          pip wheel pyogrio --no-binary pyogrio --no-build-isolation --wheel-dir=.\dist_unrepaired
          # 6. Build Geopandas (Pure Python wheel, no build isolation required)
          pip wheel geopandas --no-build-isolation --wheel-dir=.\dist_unrepaired
      - name: Repair Wheels with Delvewheel (Make Portable)
        shell: powershell
        run: |
           New-Item -ItemType Directory -Force -Path .\dist_repaired
           # Loop through all generated wheels
           Get-ChildItem .\dist_unrepaired\*.whl | ForEach-Object {
               # If it's a binary wheel (win_amd64), repair it by embedding OSGeo4W DLLs
               if ($_.Name -like "*win_amd64*") {
                   Write-Host "Repairing binary wheel: $($_.Name)" -ForegroundColor Cyan
                   delvewheel repair --ignore-in-wheel --add-path C:\OSGeo4W\bin --wheel-dir .\dist_repaired $_.FullName
               } else {
                   # If it's a pure Python wheel (like Geopandas), just copy it as-is
                   Write-Host "Copying pure Python wheel: $($_.Name)" -ForegroundColor Green
                   Copy-Item $_.FullName .\dist_repaired\
               }
           }
      - name: Upload Repaired & Portable Wheels
        uses: actions/upload-artifact@v6
        with:
          name: "wheels_geospatial_windows_${{ matrix.python-version }}"
          path: .\dist_repaired\*.whl
